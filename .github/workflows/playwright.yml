name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      ALLURE_BUILD_ORDER: ${{ github.run_number }}
      CI_JOB_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.14
    - name: Install dependencies
      run: bun install --frozen-lockfile
    - name: Install Playwright Browsers
      run: bunx playwright install --with-deps
    - name: Validate required E2E credentials
      run: |
        if [ -z "$E2E_EMAIL" ] || [ -z "$E2E_PASSWORD" ]; then
          echo "::error::Missing E2E_EMAIL/E2E_PASSWORD. Configure repository secrets (recommended) with those exact names."
          exit 1
        fi
    - name: Run Playwright tests
      run: bunx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: allure-results
        path: allure-results/
        retention-days: 30

  publish-allure:
    timeout-minutes: 30
    needs: test
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        name: allure-results
        path: allure-results
    - name: Setup Pages
      uses: actions/configure-pages@v5
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    - name: Check GitHub Pages availability
      id: pages_status
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        auth_scheme="Bearer"
        auth_header="Authorization: ${auth_scheme} ${GITHUB_TOKEN}"
        status_code=$(curl -sS -o /tmp/pages.json -w "%{http_code}" \
          -H "$auth_header" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${{ github.repository }}/pages")

        if [ "$status_code" = "200" ]; then
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          base_url=$(jq -r '.html_url // ""' /tmp/pages.json)
          echo "base_url=${base_url}" >> "$GITHUB_OUTPUT"
        else
          echo "enabled=false" >> "$GITHUB_OUTPUT"
          echo "::warning::GitHub Pages is not enabled or unavailable (HTTP $status_code). Skipping deployment."
        fi
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.14
    - name: Install dependencies
      run: bun install --frozen-lockfile
    - name: Restore previous Allure history
      if: steps.pages_status.outputs.enabled == 'true'
      run: |
        mkdir -p allure-history
        history_url="${{ steps.pages_status.outputs.base_url }}"
        history_url="${history_url%/}/allure-history/history.jsonl"

        if curl -fsSL "$history_url" -o allure-history/history.jsonl; then
          echo "Restored Allure history from $history_url"
        else
          echo "::warning::No previous Allure history found at $history_url. Continuing without history."
        fi
    - name: Generate Allure report
      run: bun run allure:generate
    - name: Update Allure history
      run: bun run allure:history:update
    - name: Bundle Allure history for next run
      run: |
        mkdir -p allure-report/allure-history
        cp allure-history/history.jsonl allure-report/allure-history/history.jsonl
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: allure-report
        path: allure-report/
        retention-days: 30
    - uses: actions/upload-pages-artifact@v3
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && steps.pages_status.outputs.enabled == 'true'
      with:
        path: allure-report/
    - id: deployment
      continue-on-error: true
      uses: actions/deploy-pages@v4
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && steps.pages_status.outputs.enabled == 'true'
    - id: deployment_retry
      continue-on-error: true
      uses: actions/deploy-pages@v4
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && steps.pages_status.outputs.enabled == 'true' && steps.deployment.outcome == 'failure'
    - name: Warn if deployment still fails
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && steps.pages_status.outputs.enabled == 'true' && steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
      run: echo "::warning::GitHub Pages deployment failed after two attempts. Allure artifacts are still available in workflow artifacts."
